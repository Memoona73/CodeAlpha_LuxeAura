<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - LuxeAura</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080808;font-family:"Poppins",sans-serif;color:#e5e7eb;min-height:100vh}
        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
        .box{background:#111;border:1px solid rgba(245,158,11,0.3);border-radius:16px;padding:40px;width:360px;text-align:center}
        h2{font-size:24px;background:linear-gradient(135deg,#f59e0b,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
        p.sub{color:#6b7280;font-size:13px;margin-bottom:24px}
        input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;color:#fff;font-family:"Poppins",sans-serif;font-size:14px;outline:none;margin-bottom:14px}
        input:focus{border-color:#f59e0b}
        .btn{width:100%;background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#000;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
        .err{color:#ef4444;font-size:13px;margin-bottom:12px}
        /* Admin Dashboard */
        #dashboard{display:none;padding:30px}
        .admin-nav{background:rgba(0,0,0,0.9);padding:16px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(245,158,11,0.2);position:sticky;top:0;z-index:100}
        .admin-logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .logout-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:"Poppins",sans-serif}
        table{width:100%;border-collapse:collapse;margin-top:20px;background:#111;border-radius:12px;overflow:hidden}
        th{background:rgba(245,158,11,0.1);color:#f59e0b;padding:12px 16px;text-align:left;font-size:12px;letter-spacing:1px;text-transform:uppercase}
        td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;color:#d1d5db}
        tr:last-child td{border-bottom:none}
        .status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .status-pending{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
        .status-confirmed{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
        .status-shipped{background:rgba(59,130,246,0.1);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
        .status-delivered{background:rgba(139,92,246,0.1);color:#8b5cf6;border:1px solid rgba(139,92,246,0.3)}
        select.status-select{background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer}
        h3.section-title{font-size:22px;color:#f59e0b;margin-bottom:6px}
        .loading{text-align:center;padding:40px;color:#6b7280}
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
    <div class="box">
        <h2>💎 LuxeAura</h2>
        <p class="sub">Admin Panel — Enter Password</p>
        <div class="err" id="loginErr" style="display:none"></div>
        <input type="password" id="adminPass" placeholder="Admin Password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn" onclick="doLogin()">Login →</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="admin-nav">
        <span class="admin-logo">💎 LuxeAura Admin</span>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
    <div style="padding:30px">
        <h3 class="section-title">Orders</h3>
        <p style="color:#6b7280;font-size:13px;margin-bottom:16px">All customer orders from the database</p>
        <div id="ordersTable"><div class="loading">Loading orders...</div></div>
    </div>
</div>

<script>
const ADMIN_PASS = 'luxeaura123';

function doLogin() {
    const pass = document.getElementById('adminPass').value;
    if (pass === ADMIN_PASS) {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadOrders();
    } else {
        const err = document.getElementById('loginErr');
        err.textContent = 'Wrong password!';
        err.style.display = 'block';
    }
}

function doLogout() {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('adminPass').value = '';
}

function loadOrders() {
    fetch('/api/orders')
    .then(res => res.json())
    .then(data => {
        if (!data.success || !data.orders.length) {
            document.getElementById('ordersTable').innerHTML = '<p style="color:#6b7280;text-align:center;padding:30px">No orders yet.</p>';
            return;
        }
        let html = `<table>
            <thead><tr>
                <th>Order #</th><th>Customer</th><th>Email</th>
                <th>Product</th><th>Total</th><th>Status</th><th>Update</th>
            </tr></thead><tbody>`;
        data.orders.forEach(o => {
            html += `<tr>
                <td>${o.order_number}</td>
                <td>${o.full_name}</td>
                <td>${o.email}</td>
                <td>${o.product_name}</td>
                <td>₹${Number(o.total).toLocaleString('en-IN')}</td>
                <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                <td>
                    <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                        <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                        <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
                        <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
                        <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
                        <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
                        <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
                    </select>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
    })
    .catch(() => {
        document.getElementById('ordersTable').innerHTML = '<p style="color:#ef4444;text-align:center;padding:30px">Could not load orders. Make sure database is running.</p>';
    });
}

function updateStatus(orderId, status) {
    fetch('/api/orders/update-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId, status: status })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) loadOrders();
        else alert('Update failed: ' + data.message);
    });
}
</script>

</body>
</html>
